name: discovery_puzzle
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  logging: ^1.3.0
  get: ^4.7.3
  flame: ^1.21.0
  get_storage: ^2.1.1
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flame_test: ^1.15.0

flutter:
  uses-material-design: true
  assets:
    - assets/levels/guanyu/
    - assets/levels/caocao/
    - assets/levels/lvbu/
    - assets/levels/zhangfei/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_foreground: "assets/icon/icon.png"
  adaptive_icon_background: "#121212"
  remove_alpha_ios: true
